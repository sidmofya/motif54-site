<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<!--
  MOTIF 54 — social share image source (1200x630).
  Rendered to /assets/og/motif54-og.png via headless Chromium/Edge.
  To regenerate after edits, see the command in the repo (assets/og).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background-color: #0A0A0C;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 64px 64px;
    font-family: 'Space Grotesk', sans-serif;
    color: #F4F4F2;
    position: relative;
  }
  /* soft copper vignette, very low — adds depth without "consumer glow" */
  .glow {
    position: absolute; right: -180px; top: -200px;
    width: 720px; height: 720px;
    background: radial-gradient(circle, rgba(200,129,79,.10), rgba(200,129,79,0) 62%);
    pointer-events: none;
  }
  .frame {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    padding: 80px 84px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  /* brand row */
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand .word {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700; font-size: 24px; letter-spacing: .18em; color: #F4F4F2;
  }
  /* body block */
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 19px; letter-spacing: .2em; text-transform: uppercase;
    color: #D08A5A; margin-bottom: 26px;
  }
  h1 {
    font-weight: 700; font-size: 88px; line-height: .98; letter-spacing: -.035em;
    color: #F4F4F2; max-width: 18ch;
  }
  .sub {
    margin-top: 30px;
    font-weight: 400; font-size: 30px; line-height: 1.35; letter-spacing: -.01em;
    color: #A2A0A6; max-width: 26ch;
  }
  /* footer row */
  .foot {
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px; letter-spacing: .12em; color: #817F88;
    padding-top: 26px; border-top: 1px solid rgba(255,255,255,.10);
  }
  .foot .site { color: #F4F4F2; }
  .foot .stack { color: #817F88; }
  .foot .dot { display:inline-block; width:9px; height:9px; background:#E36A60; margin-right:12px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="frame">

    <div class="brand">
      <svg width="56" height="56" viewBox="0 0 200 200" fill="none" aria-hidden="true">
        <circle cx="100" cy="100" r="90" stroke="#C8814F" stroke-width="6"></circle>
        <rect x="93" y="2" width="14" height="22" rx="2" fill="#C8814F"></rect>
        <text x="101" y="122" text-anchor="middle" font-family="'Space Grotesk',sans-serif" font-weight="700" font-size="64" letter-spacing="-3"><tspan fill="#F4F5F7">M</tspan><tspan fill="#C8814F">54</tspan></text>
      </svg>
      <span class="word">MOTIF 54</span>
    </div>

    <div>
      <div class="eyebrow">// The pre-bankable equity layer</div>
      <h1>We close the equity gate.</h1>
      <div class="sub">First-loss equity for African energy, minerals &amp; infrastructure &mdash; so committed debt can deploy.</div>
    </div>

    <div class="foot">
      <span class="site">motif54.com</span>
      <span class="stack"><span class="dot"></span>ENERGY &nbsp;·&nbsp; MINERALS &nbsp;·&nbsp; INFRASTRUCTURE</span>
    </div>

  </div>
</body>
</html>
